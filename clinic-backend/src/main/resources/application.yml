spring:
  datasource:
    url: ${DB_URL:${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/postgres?currentSchema=clinic_mgmt}}
    username: ${DB_USER:${SPRING_DATASOURCE_USERNAME:postgres}}
    password: ${DB_PASS:${SPRING_DATASOURCE_PASSWORD:${DB_PASSWORD:admin}}}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      connection-timeout: 30000
  flyway:
    enabled: true
    locations: classpath:db/migration
    create-schemas: true
    default-schema: clinic_mgmt
    schemas: clinic_mgmt,public
    baseline-on-migrate: true
    validate-on-migrate: false
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        default_schema: clinic_mgmt
  servlet:
    multipart:
      enabled: true
      max-file-size: 50MB
      max-request-size: 100MB
  messages:
    basename: messages
    encoding: UTF-8
    fallback-to-system-locale: false
  web:
    locale: en
    locale-resolver: accept-header
  mail:
    host: ${MAIL_HOST:localhost}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
jwt:
  secret: ${JWT_SECRET:DevOnly-Clinic-Local-JWT-Secret-Min32Chars!}
  expiration: 86400000
  refresh-expiration: 604800000
user:
  default:
    password: ${USER_DEFAULT_PASSWORD:Dev@Local2026!}
file:
  upload-dir: ${UPLOAD_DIR:D:/clinic-files}
  base-url: ${FILE_BASE_URL:http://localhost:8086/api/v1}
server:
  port: ${SERVER_PORT:8086}
  servlet:
    context-path: /api/v1
logging:
  level:
    com.clinicmanagement: INFO
    org.springframework.security: WARN
    org.flywaydb: INFO
    org.hibernate.SQL: WARN

management:
  endpoints:
    web:
      exposure:
        include: health,info
  health:
    mail:
      enabled: ${clinic.mail.enabled:false}
clinic:
  mail:
    enabled: ${MAIL_ENABLED:false}
    from: ${MAIL_FROM:noreply@clinic.local}
  password-reset:
    base-url: ${PASSWORD_RESET_BASE_URL:}
  reminders:
    cron: ${REMINDER_CRON:0 0 8 * * *}
  tv:
    display-token: ${TV_DISPLAY_TOKEN:dev-tv-display-token}

app:
  cors:
    allowed-origin-patterns: ${CORS_ALLOWED_ORIGINS:http://localhost:[*],http://127.0.0.1:[*]}
