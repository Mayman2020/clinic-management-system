version: '3.8'

# Copy .env.example to .env and set required secrets before: docker compose up --build

services:
  postgres:
    image: postgres:16-alpine
    container_name: clinic-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:?Set POSTGRES_USER in .env}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: ${POSTGRES_DB:-postgres}
    ports:
      - "5432:5432"
    volumes:
      - clinic_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:?Set POSTGRES_USER in .env}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./clinic-backend
    container_name: clinic-backend
    restart: unless-stopped
    environment:
      SERVER_PORT: 8082
      DB_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-postgres}?currentSchema=clinic_mgmt
      DB_USER: ${POSTGRES_USER:?Set POSTGRES_USER in .env}
      DB_PASS: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      JWT_SECRET: ${JWT_SECRET:?Set JWT_SECRET in .env (min 32 chars)}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:?Set CORS_ALLOWED_ORIGINS in .env}
      SPRING_PROFILES_ACTIVE: prod
      PASSWORD_RESET_BASE_URL: ${PASSWORD_RESET_BASE_URL:?Set PASSWORD_RESET_BASE_URL in .env}
      MAIL_ENABLED: ${MAIL_ENABLED:-false}
      UPLOAD_DIR: /data/uploads
      FILE_BASE_URL: http://localhost:8082/api/v1
    ports:
      - "8082:8082"
    volumes:
      - clinic_uploads:/data/uploads
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build: ./clinic-frontend
    container_name: clinic-frontend
    restart: unless-stopped
    environment:
      CM_API_URL: /api/v1
      CM_FILE_URL: /api/v1/files
    ports:
      - "4200:80"
    depends_on:
      - backend

volumes:
  clinic_pg_data:
  clinic_uploads:
