<div class="page-shell">
  <app-page-header [title]="'PATIENTS.TITLE' | translate">
    <div class="page-actions">
      <rms-icon-btn icon="add" tooltipKey="PATIENTS.NEW" variant="primary" *appCan="'patients'; appCanAction: 'create'" (clicked)="onCreate()"></rms-icon-btn>
      <rms-icon-btn icon="refresh" tooltipKey="COMMON.REFRESH" (clicked)="load()"></rms-icon-btn>
    </div>
  </app-page-header>

  <div class="loading-wrap" *ngIf="listLoad.showInitialSpinner">
    <mat-spinner diameter="40"></mat-spinner>
  </div>

  <app-empty-state
    *ngIf="listLoad.showSurface && rows.length === 0 && !hasActiveFilters()"
    icon="people"
    titleKey="PATIENTS.TITLE"
    messageKey="COMMON.NO_DATA">
  </app-empty-state>

  <app-inline-state
    *ngIf="listLoad.showSurface && rows.length === 0 && hasActiveFilters()"
    icon="filter_alt"
    titleKey="COMMON.NO_RESULTS"
    messageKey="COMMON.CLEAR_FILTERS"
    actionLabelKey="COMMON.CLEAR"
    (action)="clearFilters()">
  </app-inline-state>

  <div class="app-list-surface" [class.is-refreshing]="listLoad.refreshing"
    *ngIf="listLoad.showSurface && (rows.length > 0 || hasActiveFilters())">
    <div class="list-refresh-spinner" *ngIf="listLoad.refreshing">
      <mat-spinner diameter="32"></mat-spinner>
    </div>

    <section class="list-stats">
      <article class="stat-pill stat-pill--purple">
        <span class="stat-label">{{ 'COMMON.TOTAL' | translate }}</span>
        <strong>{{ total }}</strong>
      </article>
      <article class="stat-pill stat-pill--cyan">
        <span class="stat-label">{{ 'COMMON.ON_PAGE' | translate }}</span>
        <strong>{{ rows.length }}</strong>
      </article>
    </section>

    <section class="estate-card directory-table-card">
      <div class="estate-table-toolbar directory-toolbar">
        <div class="directory-toolbar-top table-list-toolbar">
          <div class="directory-search">
            <span class="material-icons">search</span>
            <input [(ngModel)]="search" (keyup.enter)="onSearch()" [placeholder]="'COMMON.SEARCH' | translate">
          </div>
          <select class="estate-filter-select" [(ngModel)]="activeFilter" (ngModelChange)="onFilterChange()">
            <option value="">{{ 'COMMON.ALL' | translate }}</option>
            <option value="true">{{ 'COMMON.ACTIVE' | translate }}</option>
            <option value="false">{{ 'COMMON.INACTIVE' | translate }}</option>
          </select>
          <rms-icon-btn icon="search" tooltipKey="COMMON.SEARCH" variant="primary" (clicked)="onSearch()"></rms-icon-btn>
          <app-table-export-toolbar
            [inline]="true"
            permissionKey="patients"
            [title]="'PATIENTS.TITLE' | translate"
            fileName="patients"
            [columns]="exportColumns"
            [loadRows]="loadExportRows">
          </app-table-export-toolbar>
        </div>
      </div>
      <div class="app-table-wrap">
        <table mat-table [dataSource]="rows" class="app-data-table">
          <ng-container *ngFor="let col of columns" [matColumnDef]="col.key">
            <th mat-header-cell *matHeaderCellDef>{{ col.labelKey | translate }}</th>
            <td mat-cell *matCellDef="let row">
              <ng-container [ngSwitch]="col.translate">
                <span *ngSwitchCase="'GENDER'">{{ row[col.key] | tk:'GENDER' }}</span>
                <span *ngSwitchDefault>{{ row[col.key] }}</span>
              </ng-container>
            </td>
          </ng-container>
          <ng-container matColumnDef="actions">
            <th mat-header-cell *matHeaderCellDef>{{ 'COMMON.ACTIONS' | translate }}</th>
            <td mat-cell *matCellDef="let row" class="action-cell">
              <a mat-icon-button [routerLink]="['/admin/patients', row.id]" [matTooltip]="'PATIENTS.PATIENT_360' | translate" [attr.aria-label]="'PATIENTS.PATIENT_360' | translate"><span class="material-icons">person</span></a>
              <button mat-icon-button type="button" *appCan="'consultation'; appCanAction: 'view'" (click)="onHistory(row)" [matTooltip]="'PATIENTS.CONSULTATION_HISTORY' | translate" [attr.aria-label]="'PATIENTS.CONSULTATION_HISTORY' | translate"><span class="material-icons">history</span></button>
              <button mat-icon-button type="button" *appCan="'patients'; appCanAction: 'edit'" (click)="onEdit(row)" [matTooltip]="'COMMON.EDIT' | translate" [attr.aria-label]="'COMMON.EDIT' | translate"><span class="material-icons">edit</span></button>
              <button mat-icon-button type="button" *appCan="'patients'; appCanAction: 'delete'" (click)="onArchive(row)" [matTooltip]="'COMMON.ARCHIVE' | translate" [attr.aria-label]="'COMMON.ARCHIVE' | translate"><span class="material-icons">archive</span></button>
            </td>
          </ng-container>
          <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
          <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
        </table>
      </div>
      <app-table-pager [length]="total" [pageSize]="size" [pageIndex]="page" (pageIndexChange)="onPageIndexChange($event)"></app-table-pager>
    </section>
  </div>
</div>
