<div class="page-shell">
  <app-page-header [title]="'APPOINTMENTS.TITLE' | translate">
    <button *appCan="'appointments'; appCanAction: 'create'" mat-flat-button color="primary" type="button" (click)="onCreate()"><span class="material-icons">add</span>{{ 'APPOINTMENTS.NEW' | translate }}</button>
    <button *appCan="'appointments'; appCanAction: 'create'" mat-stroked-button type="button" (click)="onWalkIn()">{{ 'APPOINTMENTS.WALK_IN' | translate }}</button>
    <button mat-stroked-button type="button" (click)="load()"><span class="material-icons">refresh</span>{{ 'COMMON.REFRESH' | translate }}</button>
  </app-page-header>
  <div class="estate-card admin-filters">
    <mat-form-field appearance="outline" class="search-field">
      <mat-label>{{ 'COMMON.SEARCH' | translate }}</mat-label>
      <input matInput [(ngModel)]="search" (keyup.enter)="page=0; load()">
    </mat-form-field>
    <button mat-flat-button color="primary" (click)="page=0; load()">{{ 'COMMON.SEARCH' | translate }}</button>
  </div>
  <div class="estate-card" *ngIf="!loading; else loadingTpl">
    <table mat-table [dataSource]="rows" class="app-data-table">
      <ng-container *ngFor="let col of columns" [matColumnDef]="col.key">
        <th mat-header-cell *matHeaderCellDef>{{ col.labelKey | translate }}</th>
        <td mat-cell *matCellDef="let row">
          <ng-container [ngSwitch]="col.key">
            <span *ngSwitchCase="'status'">{{ row.status | tk:'STATUS' }}</span>
            <span *ngSwitchDefault>{{ row[col.key] }}</span>
          </ng-container>
        </td>
      </ng-container>
      <ng-container matColumnDef="actions">
        <th mat-header-cell *matHeaderCellDef>{{ 'COMMON.ACTIONS' | translate }}</th>
        <td mat-cell *matCellDef="let row">
          <button *appCan="'appointments'; appCanAction: 'edit'" mat-icon-button type="button" (click)="onReschedule(row)" [disabled]="row.status === 'CANCELLED'"><span class="material-icons">event</span></button>
          <button *appCan="'appointments'; appCanAction: 'approve'" mat-icon-button type="button" (click)="onConfirm(row)" [disabled]="row.status === 'CONFIRMED' || row.status === 'CANCELLED'"><span class="material-icons">check_circle</span></button>
          <button *appCan="'appointments'; appCanAction: 'edit'" mat-icon-button type="button" (click)="onCancel(row)" [disabled]="row.status === 'CANCELLED'"><span class="material-icons">cancel</span></button>
        </td>
      </ng-container>
      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
    </table>
    <p *ngIf="!rows.length" class="empty-state">{{ 'COMMON.NO_DATA' | translate }}</p>
    <mat-paginator [length]="total" [pageSize]="size" [pageIndex]="page" [pageSizeOptions]="[10,20,50]" (page)="onPage($event)"></mat-paginator>
  </div>
  <ng-template #loadingTpl><mat-spinner diameter="40"></mat-spinner></ng-template>
</div>
