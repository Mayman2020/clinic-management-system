<div class="page-shell">
  <app-page-header [title]="'APPOINTMENTS.TITLE' | translate">
    <div class="page-actions">
      <rms-icon-btn icon="add" tooltipKey="APPOINTMENTS.NEW" variant="primary" *appCan="'appointments'; appCanAction: 'create'" (clicked)="onCreate()"></rms-icon-btn>
      <rms-icon-btn icon="directions_walk" tooltipKey="APPOINTMENTS.WALK_IN" variant="gold" *appCan="'appointments'; appCanAction: 'create'" (clicked)="onWalkIn()"></rms-icon-btn>
      <rms-icon-btn icon="refresh" tooltipKey="COMMON.REFRESH" (clicked)="load()"></rms-icon-btn>
    </div>
  </app-page-header>

  <div class="loading-wrap" *ngIf="listLoad.showInitialSpinner">
    <mat-spinner diameter="40"></mat-spinner>
  </div>

  <app-empty-state
    *ngIf="listLoad.showSurface && rows.length === 0 && !hasActiveFilters()"
    icon="event"
    titleKey="APPOINTMENTS.TITLE"
    messageKey="COMMON.NO_DATA">
  </app-empty-state>

  <div class="app-list-surface" [class.is-refreshing]="listLoad.refreshing"
    *ngIf="listLoad.showSurface && (rows.length > 0 || hasActiveFilters())">
    <div class="list-refresh-spinner" *ngIf="listLoad.refreshing">
      <mat-spinner diameter="32"></mat-spinner>
    </div>

    <section class="list-stats">
      <article class="stat-pill stat-pill--purple"><span class="stat-label">{{ 'COMMON.TOTAL' | translate }}</span><strong>{{ total }}</strong></article>
      <article class="stat-pill stat-pill--cyan"><span class="stat-label">{{ 'COMMON.ON_PAGE' | translate }}</span><strong>{{ rows.length }}</strong></article>
    </section>
    <section class="estate-card directory-table-card">
      <div class="estate-table-toolbar directory-toolbar">
        <div class="directory-toolbar-top table-list-toolbar">
          <div class="directory-search">
            <span class="material-icons">search</span>
            <input [(ngModel)]="search" (keyup.enter)="onSearch()" [placeholder]="'COMMON.SEARCH' | translate">
          </div>
          <select class="estate-filter-select" [(ngModel)]="statusFilter" (ngModelChange)="onFilterChange()">
            <option value="">{{ 'COMMON.ALL' | translate }}</option>
            <option *ngFor="let s of statusOptions" [value]="s">{{ s | tk:'STATUS' }}</option>
          </select>
          <rms-icon-btn icon="search" tooltipKey="COMMON.SEARCH" variant="primary" (clicked)="onSearch()"></rms-icon-btn>
        </div>
      </div>
      <div class="app-table-wrap">
        <table mat-table [dataSource]="rows" class="app-data-table">
          <ng-container *ngFor="let col of columns" [matColumnDef]="col.key">
            <th mat-header-cell *matHeaderCellDef>{{ col.labelKey | translate }}</th>
            <td mat-cell *matCellDef="let row">
              <ng-container [ngSwitch]="col.key">
                <span *ngSwitchCase="'status'">{{ row.status | tk:'STATUS' }}</span>
                <span *ngSwitchDefault>{{ row[col.key] }}</span>
              </ng-container>
            </td>
          </ng-container>
          <ng-container matColumnDef="actions">
            <th mat-header-cell *matHeaderCellDef>{{ 'COMMON.ACTIONS' | translate }}</th>
            <td mat-cell *matCellDef="let row" class="action-cell">
              <button *appCan="'appointments'; appCanAction: 'edit'" mat-icon-button type="button" [matTooltip]="'APPOINTMENTS.RESCHEDULE' | translate" (click)="onReschedule(row)" [disabled]="row.status === 'CANCELLED'"><span class="material-icons">event</span></button>
              <button *appCan="'appointments'; appCanAction: 'approve'" mat-icon-button type="button" [matTooltip]="'APPOINTMENTS.CONFIRM' | translate" (click)="onConfirm(row)" [disabled]="row.status === 'CONFIRMED' || row.status === 'CANCELLED'"><span class="material-icons">check_circle</span></button>
              <button *appCan="'queue'; appCanAction: 'create'" mat-icon-button type="button" [matTooltip]="'WORKFLOW.CHECK_IN' | translate" (click)="onCheckIn(row)" [disabled]="!canCheckIn(row)"><span class="material-icons">how_to_reg</span></button>
              <button *appCan="'consultation'; appCanAction: 'create'" mat-icon-button type="button" [matTooltip]="'WORKFLOW.START_CONSULTATION' | translate" (click)="onStartConsultation(row)" [disabled]="!canConsult(row)"><span class="material-icons">medical_information</span></button>
              <button *appCan="'appointments'; appCanAction: 'edit'" mat-icon-button type="button" [matTooltip]="'WORKFLOW.SEND_REMINDER' | translate" (click)="onSendReminder(row)" [disabled]="!canRemind(row)"><span class="material-icons">sms</span></button>
              <button *appCan="'appointments'; appCanAction: 'edit'" mat-icon-button type="button" [matTooltip]="'APPOINTMENTS.CANCEL' | translate" (click)="onCancel(row)" [disabled]="row.status === 'CANCELLED'"><span class="material-icons">cancel</span></button>
            </td>
          </ng-container>
          <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
          <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
        </table>
      </div>
      <app-table-pager [length]="total" [pageSize]="size" [pageIndex]="page" (pageIndexChange)="onPageIndexChange($event)"></app-table-pager>
    </section>
  </div>
</div>
