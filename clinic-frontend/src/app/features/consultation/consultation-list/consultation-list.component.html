<div class="page-shell">
  <app-page-header [title]="'CONSULTATION.TITLE' | translate">
    <a mat-flat-button color="primary" routerLink="/admin/consultation/new"><span class="material-icons">add</span>{{ 'CONSULTATION.NEW' | translate }}</a>
    <button mat-stroked-button type="button" (click)="load()"><span class="material-icons">refresh</span>{{ 'COMMON.REFRESH' | translate }}</button>
  </app-page-header>
  <div class="estate-card admin-filters" *ngIf="!patientFilter">
    <mat-form-field appearance="outline" class="search-field">
      <mat-label>{{ 'COMMON.SEARCH' | translate }}</mat-label>
      <input matInput [(ngModel)]="search" (keyup.enter)="page=0; load()">
    </mat-form-field>
    <button mat-flat-button color="primary" (click)="page=0; load()">{{ 'COMMON.SEARCH' | translate }}</button>
  </div>
  <div class="estate-card" *ngIf="!loading; else loadingTpl">
    <table mat-table [dataSource]="rows" class="app-data-table">
      <ng-container *ngFor="let col of columns" [matColumnDef]="col.key">
        <th mat-header-cell *matHeaderCellDef>{{ col.labelKey | translate }}</th>
        <td mat-cell *matCellDef="let row">
          <ng-container [ngSwitch]="col.key">
            <span *ngSwitchCase="'status'">{{ row.status | tk:'STATUS' }}</span>
            <span *ngSwitchDefault>{{ row[col.key] }}</span>
          </ng-container>
        </td>
      </ng-container>
      <ng-container matColumnDef="actions">
        <th mat-header-cell *matHeaderCellDef>{{ 'COMMON.ACTIONS' | translate }}</th>
        <td mat-cell *matCellDef="let row">
          <a *appCan="'consultation'; appCanAction: 'edit'" mat-icon-button [routerLink]="['/admin/consultation', row.id, 'edit']"><span class="material-icons">edit</span></a>
        </td>
      </ng-container>
      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
    </table>
    <p *ngIf="!rows.length" class="empty-state">{{ 'COMMON.NO_DATA' | translate }}</p>
    <mat-paginator *ngIf="!patientFilter" [length]="total" [pageSize]="size" [pageIndex]="page" [pageSizeOptions]="[10,20,50]" (page)="onPage($event)"></mat-paginator>
  </div>
  <ng-template #loadingTpl><mat-spinner diameter="40"></mat-spinner></ng-template>
</div>
