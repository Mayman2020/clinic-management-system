<div class="page-shell">
  <app-page-header [title]="'RADIOLOGY.TITLE' | translate">
    <div class="page-actions">
      <rms-icon-btn icon="add" tooltipKey="RADIOLOGY.NEW" variant="primary" *appCan="'radiology'; appCanAction: 'create'" (clicked)="onCreate()"></rms-icon-btn>
      <rms-icon-btn icon="refresh" tooltipKey="COMMON.REFRESH" (clicked)="load()"></rms-icon-btn>
    </div>
  </app-page-header>

  <div class="loading-wrap" *ngIf="loading"><mat-spinner diameter="40"></mat-spinner></div>

  <div class="app-list-surface" *ngIf="!loading">
    <section class="list-stats">
      <article class="stat-pill stat-pill--indigo"><span class="stat-label">{{ 'COMMON.TOTAL' | translate }}</span><strong>{{ total }}</strong></article>
      <article class="stat-pill stat-pill--cyan"><span class="stat-label">{{ 'COMMON.ON_PAGE' | translate }}</span><strong>{{ rows.length }}</strong></article>
    </section>
    <section class="estate-card directory-table-card">
      <div class="estate-table-toolbar directory-toolbar">
        <div class="directory-toolbar-top table-list-toolbar">
          <div class="directory-search">
            <span class="material-icons">search</span>
            <input [(ngModel)]="search" (keyup.enter)="page=0; load()" [placeholder]="'COMMON.SEARCH' | translate">
          </div>
          <rms-icon-btn icon="search" tooltipKey="COMMON.SEARCH" variant="primary" (clicked)="page=0; load()"></rms-icon-btn>
        </div>
      </div>
      <div class="app-table-wrap">
        <table mat-table [dataSource]="rows" class="app-data-table">
          <ng-container *ngFor="let col of columns" [matColumnDef]="col.key">
            <th mat-header-cell *matHeaderCellDef>{{ col.labelKey | translate }}</th>
            <td mat-cell *matCellDef="let row">
              <ng-container [ngSwitch]="col.key">
                <span *ngSwitchCase="'status'">{{ row.status | tk:'STATUS' }}</span>
                <span *ngSwitchDefault>{{ row[col.key] }}</span>
              </ng-container>
            </td>
          </ng-container>
          <ng-container matColumnDef="attachment">
            <th mat-header-cell *matHeaderCellDef>{{ 'RADIOLOGY.ATTACHMENT' | translate }}</th>
            <td mat-cell *matCellDef="let row">
              <button *ngIf="row.imageUrl" mat-icon-button type="button" [matTooltip]="'RADIOLOGY.VIEW_ATTACHMENT' | translate" (click)="openAttachment(row.imageUrl)"><span class="material-icons">visibility</span></button>
              <label *appCan="'radiology'; appCanAction: 'edit'" class="upload-inline" [matTooltip]="'RADIOLOGY.UPLOAD_IMAGE' | translate">
                <span class="material-icons">{{ uploadingId === row.id ? 'hourglass_empty' : 'upload_file' }}</span>
                <input type="file" hidden (change)="onUploadAttachment(row, $event)" accept=".jpg,.jpeg,.png,.pdf,.dcm">
              </label>
            </td>
          </ng-container>
          <ng-container matColumnDef="actions">
            <th mat-header-cell *matHeaderCellDef>{{ 'COMMON.ACTIONS' | translate }}</th>
            <td mat-cell *matCellDef="let row">
              <button *appCan="'radiology'; appCanAction: 'edit'" mat-icon-button type="button" [matTooltip]="'RADIOLOGY.NEXT_STATUS' | translate" (click)="onAdvance(row)" [disabled]="!nextStatus(row)"><span class="material-icons">arrow_forward</span></button>
            </td>
          </ng-container>
          <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
          <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
        </table>
      </div>
      <p *ngIf="!rows.length" class="empty-state">{{ 'COMMON.NO_DATA' | translate }}</p>
      <app-table-pager [length]="total" [pageSize]="size" [pageIndex]="page" (pageIndexChange)="onPageIndexChange($event)"></app-table-pager>
    </section>
  </div>
</div>
