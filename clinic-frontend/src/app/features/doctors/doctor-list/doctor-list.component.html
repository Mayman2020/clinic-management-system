<div class="page-shell">
  <app-page-header [title]="'DOCTORS.TITLE' | translate">
    <div class="page-actions">
      <rms-icon-btn icon="add" tooltipKey="DOCTORS.NEW" variant="primary" *appCan="'doctors'; appCanAction: 'create'" (clicked)="onCreate()"></rms-icon-btn>
      <rms-icon-btn icon="refresh" tooltipKey="COMMON.REFRESH" (clicked)="load()"></rms-icon-btn>
    </div>
  </app-page-header>

  <div class="loading-wrap" *ngIf="listLoad.showInitialSpinner"><mat-spinner diameter="40"></mat-spinner></div>

  <app-empty-state
    *ngIf="listLoad.showSurface && rows.length === 0 && !hasActiveFilters()"
    icon="medical_services"
    titleKey="DOCTORS.TITLE"
    messageKey="COMMON.NO_DATA">
  </app-empty-state>

  <div class="app-list-surface" [class.is-refreshing]="listLoad.refreshing"
    *ngIf="listLoad.showSurface && (rows.length > 0 || hasActiveFilters())">
    <div class="list-refresh-spinner" *ngIf="listLoad.refreshing"><mat-spinner diameter="32"></mat-spinner></div>
    <section class="list-stats">
      <article class="stat-pill stat-pill--teal"><span class="stat-label">{{ 'COMMON.TOTAL' | translate }}</span><strong>{{ total }}</strong></article>
      <article class="stat-pill stat-pill--cyan"><span class="stat-label">{{ 'COMMON.ON_PAGE' | translate }}</span><strong>{{ rows.length }}</strong></article>
    </section>
    <section class="estate-card directory-table-card">
      <div class="estate-table-toolbar directory-toolbar">
        <div class="directory-toolbar-top table-list-toolbar">
          <div class="directory-search">
            <span class="material-icons">search</span>
            <input [(ngModel)]="search" (keyup.enter)="onSearch()" [placeholder]="'COMMON.SEARCH' | translate">
          </div>
          <app-estate-lov-select
            label="DOCTORS.SPECIALTY"
            [options]="specialtyOptions"
            [showAll]="true"
            [(ngModel)]="specialtyFilter"
            (valueChange)="onFilterChange()">
          </app-estate-lov-select>
          <select class="estate-filter-select" [(ngModel)]="activeFilter" (ngModelChange)="onFilterChange()">
            <option value="">{{ 'COMMON.ALL' | translate }}</option>
            <option value="true">{{ 'COMMON.ACTIVE' | translate }}</option>
            <option value="false">{{ 'COMMON.INACTIVE' | translate }}</option>
          </select>
          <rms-icon-btn icon="search" tooltipKey="COMMON.SEARCH" variant="primary" (clicked)="onSearch()"></rms-icon-btn>
          <app-table-export-toolbar
            [inline]="true"
            permissionKey="doctors"
            [title]="'DOCTORS.TITLE' | translate"
            fileName="doctors"
            [columns]="exportColumns"
            [loadRows]="loadExportRows">
          </app-table-export-toolbar>
        </div>
      </div>
      <div class="app-table-wrap">
        <table mat-table [dataSource]="rows" class="app-data-table">
          <ng-container *ngFor="let col of columns" [matColumnDef]="col.key">
            <th mat-header-cell *matHeaderCellDef>{{ col.labelKey | translate }}</th>
            <td mat-cell *matCellDef="let row">
              <ng-container [ngSwitch]="col.key">
                <span *ngSwitchCase="'specialty'">{{ row.specialty | tk:'SPECIALTY' }}</span>
                <span *ngSwitchCase="'status'">{{ row.status | tk:'STATUS' }}</span>
                <span *ngSwitchDefault>{{ row[col.key] }}</span>
              </ng-container>
            </td>
          </ng-container>
          <ng-container matColumnDef="actions">
            <th mat-header-cell *matHeaderCellDef>{{ 'COMMON.ACTIONS' | translate }}</th>
            <td mat-cell *matCellDef="let row">
              <button *appCan="'doctors'; appCanAction: 'edit'" mat-icon-button type="button" (click)="onEdit(row)" [matTooltip]="'COMMON.EDIT' | translate" [attr.aria-label]="'COMMON.EDIT' | translate"><span class="material-icons">edit</span></button>
              <button *appCan="'doctors'; appCanAction: 'edit'" mat-icon-button type="button" (click)="onSchedule(row)" [matTooltip]="'DOCTORS.SCHEDULES' | translate" [attr.aria-label]="'DOCTORS.SCHEDULES' | translate"><span class="material-icons">schedule</span></button>
            </td>
          </ng-container>
          <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
          <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
        </table>
      </div>
      <app-table-pager [length]="total" [pageSize]="size" [pageIndex]="page" (pageIndexChange)="onPageIndexChange($event)"></app-table-pager>
    </section>
  </div>
</div>
